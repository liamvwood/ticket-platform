# Social media crawler detection — these bots need OG meta-tag HTML, not the SPA shell.
map $http_user_agent $is_social_bot {
    default                 0;
    ~*Applebot              1;
    ~*Discordbot            1;
    ~*facebookexternalhit   1;
    ~*LinkedInBot           1;
    ~*Slackbot              1;
    ~*Telegrambot           1;
    ~*Twitterbot            1;
    ~*WhatsApp              1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Limit request body size (prevent large upload abuse)
    client_max_body_size 1m;

    # Proxy all /og/* requests to the API.
    # Handles both direct OG bot crawls and og:image URLs that reference this domain.
    location ^~ /og/ {
        proxy_pass         ${API_INTERNAL_URL};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Route social bots to the OG endpoint for rich link previews;
    # real visitors receive the SPA as normal.
    # Uses rewrite (not proxy_pass) so no DNS resolver directive is needed.
    location ~* ^/events/(.+)$ {
        if ($is_social_bot) {
            rewrite ^/events/(.+)$ /og/events/$1 last;
        }
        try_files $uri /index.html;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
