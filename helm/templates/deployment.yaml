apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.serviceAccount.roleArn }}
      serviceAccountName: {{ .Release.Name }}-api
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.env.ASPNETCORE_ENVIRONMENT }}
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: connectionString
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwtSecret
            - name: Stripe__SecretKey
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: stripeSecretKey
            - name: Stripe__WebhookSecret
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: stripeWebhookSecret
            - name: AppOwner__Email
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: ownerEmail
            - name: AppOwner__Password
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: ownerPassword
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redisConnectionString
                  optional: true
            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.aws.bucketName }}
            - name: Aws__BucketName
              value: {{ .Values.aws.bucketName | quote }}
            - name: Aws__Region
              value: {{ .Values.aws.region | quote }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
