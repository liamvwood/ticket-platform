{{- if .Values.serviceAccount.roleArn }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Release.Namespace }}
  annotations:
    # IRSA: allows the API pod to assume this IAM role via the EKS OIDC provider.
    # The role grants s3:PutObject/GetObject on the thumbnails bucket.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
{{- end }}
