name: CI/CD – Test Ring

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'terraform/**'
      - 'Dockerfile'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  API_IMAGE: ticket-platform-api
  FRONTEND_IMAGE: ticket-platform-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET API build ──────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & build .NET
        run: |
          dotnet restore TicketPlatform.slnx
          dotnet build TicketPlatform.slnx -c Release --no-restore

      # ── Frontend build ──────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/TicketPlatform.Web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/TicketPlatform.Web
        run: npm ci

      - name: Build frontend (type-check + bundle)
        working-directory: src/TicketPlatform.Web
        run: npm run build

      # ── Apply DB migrations ──────────────────────────────────
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply migrations
        working-directory: src/TicketPlatform.Api
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=ticketplatform;Username=postgres;Password=postgres"
        run: dotnet ef database update --project ../TicketPlatform.Infrastructure

      # ── Seed test data ───────────────────────────────────────
      - name: Seed test data
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d ticketplatform -c "
            INSERT INTO \"Venues\" (\"Id\",\"Name\",\"Address\",\"City\",\"State\",\"CreatedAt\")
            VALUES ('a0000000-0000-0000-0000-000000000001',
                    'Stubb''s Waller Creek','801 Red River St','Austin','TX',now())
            ON CONFLICT DO NOTHING;"

      # ── Start API for E2E ────────────────────────────────────
      - name: Start API
        working-directory: src/TicketPlatform.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:8080
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=ticketplatform;Username=postgres;Password=postgres"
          Payment__Provider: Mock
          Otp__Provider: Mock
          Jwt__Secret: ci-test-secret-at-least-32-characters-long
        run: |
          # Run compiled DLL directly to bypass launchSettings.json port override (5256 → 8080)
          DLL=$(find bin/Release -name "TicketPlatform.Api.dll" | head -1)
          nohup dotnet "$DLL" > /tmp/api.log 2>&1 &

      - name: Wait for API
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8080/healthz; then echo "API ready"; exit 0; fi
            echo "Waiting for API... ($i/45)"
            sleep 2
          done
          echo "=== API failed to start — full log: ==="
          cat /tmp/api.log
          exit 1

      # ── Seed E2E users ───────────────────────────────────────
      - name: Seed E2E users
        run: |
          # Register buyer (User role) — must include phoneNumber (NOT NULL column)
          STATUS=$(curl -s -w "%{http_code}" -o /tmp/reg.json \
            -X POST http://localhost:8080/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2ebuyer@slingshot.dev","password":"Password123!","phoneNumber":""}')
          [ "$STATUS" = "200" ] || [ "$STATUS" = "409" ] || \
            { echo "Buyer registration failed ($STATUS): $(cat /tmp/reg.json)"; exit 1; }
          echo "Buyer user: $STATUS"

          # Seed VenueAdmin via invite flow (AppOwner seeded from appsettings.Development.json)
          OWNER_TOKEN=$(curl -sf -X POST http://localhost:8080/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"owner@slingshot.dev","password":"ChangeMe123!"}' | jq -r '.token')
          [ -n "$OWNER_TOKEN" ] || { echo "AppOwner login failed"; exit 1; }

          INVITE=$(curl -sf -X POST http://localhost:8080/admin/invites \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OWNER_TOKEN" \
            -d '{"email":"venue@slingshot.dev","venueName":"Test Venue Admin"}')
          INVITE_TOKEN=$(echo "$INVITE" | jq -r '.token // empty')

          if [ -n "$INVITE_TOKEN" ]; then
            curl -sf -X POST "http://localhost:8080/invites/$INVITE_TOKEN/accept" \
              -H "Content-Type: application/json" \
              -d '{"password":"Password123!","phoneNumber":""}' > /dev/null
            echo "VenueAdmin seeded via invite"
          else
            echo "Invite creation response: $INVITE"
            # User may already exist with correct role — verify login works
            V_STATUS=$(curl -s -w "%{http_code}" -o /tmp/vlogin.json \
              -X POST http://localhost:8080/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"venue@slingshot.dev","password":"Password123!"}')
            [ "$V_STATUS" = "200" ] || { echo "VenueAdmin seed failed (status $V_STATUS): $(cat /tmp/vlogin.json)"; exit 1; }
            echo "VenueAdmin already exists"
          fi

      # ── Start frontend dev server ────────────────────────────
      - name: Start frontend dev server
        working-directory: src/TicketPlatform.Web
        env:
          VITE_API_URL: http://localhost:8080
        run: nohup npm run dev > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && echo "Frontend ready" && break
            echo "Waiting for frontend... ($i/20)"
            sleep 2
          done

      # ── Verify API still alive before E2E ───────────────────
      - name: Verify API alive
        run: |
          ps aux | grep -v grep | grep dotnet || echo "No dotnet process found!"
          curl -sf http://localhost:8080/healthz || (echo "=== API died — full log: ==="; cat /tmp/api.log; exit 1)

      # ── Playwright E2E tests ─────────────────────────────────
      - name: Install Playwright browsers
        working-directory: src/TicketPlatform.Web
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: src/TicketPlatform.Web
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/TicketPlatform.Web/e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. BUILD IMAGES & DEPLOY TO ECS FARGATE
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Test ECS
    runs-on: ubuntu-latest
    needs: test
    environment: test

    steps:
      - name: Validate required secrets
        env:
          _AWS_REGION: ${{ secrets.AWS_REGION }}
          _AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          _AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          _ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          _ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          _TEST_API_HOST: ${{ secrets.TEST_API_HOST }}
          _TEST_FRONTEND_HOST: ${{ secrets.TEST_FRONTEND_HOST }}
        run: |
          missing=()
          [ -z "$_AWS_REGION" ]            && missing+=(AWS_REGION)
          [ -z "$_AWS_ACCESS_KEY_ID" ]     && missing+=(AWS_ACCESS_KEY_ID)
          [ -z "$_AWS_SECRET_ACCESS_KEY" ] && missing+=(AWS_SECRET_ACCESS_KEY)
          [ -z "$_ECR_REGISTRY" ]          && missing+=(ECR_REGISTRY)
          [ -z "$_ECS_CLUSTER" ]           && missing+=(ECS_CLUSTER)
          [ -z "$_TEST_API_HOST" ]         && missing+=(TEST_API_HOST)
          [ -z "$_TEST_FRONTEND_HOST" ]    && missing+=(TEST_FRONTEND_HOST)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets in the 'test' environment: ${missing[*]}"
            echo "   Configure them at: https://github.com/${{ github.repository }}/settings/environments"
            echo "   See terraform/README.md §6 for the value of each secret."
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push API image ───────────────────────────────
      - name: Build & push API image
        run: |
          IMAGE=$ECR_REGISTRY/$API_IMAGE:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile .
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/$API_IMAGE:latest
          docker push $ECR_REGISTRY/$API_IMAGE:latest
          echo "api_image=$IMAGE" >> $GITHUB_ENV

      # ── Build & push frontend image ──────────────────────────
      - name: Build & push frontend image
        run: |
          IMAGE=$ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}
          docker build \
            --build-arg VITE_API_URL=https://${{ secrets.TEST_API_HOST }} \
            -t $IMAGE \
            -f Dockerfile.frontend .
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          echo "frontend_image=$IMAGE" >> $GITHUB_ENV

      # ── Deploy API: register new task def revision + update service ──
      # Secrets are injected from SSM at task start by the ECS agent —
      # no secrets are passed through GitHub Actions.
      - name: Deploy API to ECS
        run: |
          CLUSTER=${{ secrets.ECS_CLUSTER }}

          # Fetch the current task definition and strip read-only fields
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${CLUSTER}-api \
            --query 'taskDefinition' --output json | \
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          # Swap in the new image SHA
          UPDATED=$(echo "$TASK_DEF" | jq --arg img "${{ env.api_image }}" \
            '.containerDefinitions[0].image = $img')

          # Register the new revision and capture its ARN
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$UPDATED" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "${CLUSTER}-api" \
            --task-definition "$NEW_ARN" \
            --region ${{ env.AWS_REGION }}

      # ── Deploy frontend: same pattern ────────────────────────
      - name: Deploy frontend to ECS
        run: |
          CLUSTER=${{ secrets.ECS_CLUSTER }}

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${CLUSTER}-frontend \
            --query 'taskDefinition' --output json | \
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          UPDATED=$(echo "$TASK_DEF" | jq --arg img "${{ env.frontend_image }}" \
            '.containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$UPDATED" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "${CLUSTER}-frontend" \
            --task-definition "$NEW_ARN" \
            --region ${{ env.AWS_REGION }}

      # ── Wait for both services to stabilise ─────────────────
      - name: Wait for ECS services to stabilise
        run: |
          CLUSTER=${{ secrets.ECS_CLUSTER }}
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "${CLUSTER}-api" "${CLUSTER}-frontend" \
            --region ${{ env.AWS_REGION }}

      # ── Smoke test the live HTTPS endpoint ───────────────────
      - name: Smoke test – API health
        run: |
          echo "Testing https://${{ secrets.TEST_API_HOST }}/healthz"
          for i in $(seq 1 12); do
            curl -sf https://${{ secrets.TEST_API_HOST }}/healthz && echo "✅ API healthy" && break
            echo "Waiting for API... ($i/12)"
            sleep 10
          done

      - name: Smoke test – Frontend
        run: |
          echo "Testing https://${{ secrets.TEST_FRONTEND_HOST }}"
          curl -sf https://${{ secrets.TEST_FRONTEND_HOST }} | grep -q "Slingshot\|ticket" \
            && echo "✅ Frontend reachable" \
            || (echo "❌ Frontend check failed" && exit 1)

  # ─────────────────────────────────────────────────────────────
  # 3. E2E TESTS AGAINST LIVE ECS ENDPOINTS
  # ─────────────────────────────────────────────────────────────
  e2e-ecs:
    name: E2E – Test Ring
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/TicketPlatform.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/TicketPlatform.Web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/TicketPlatform.Web
        run: npx playwright install chromium --with-deps

      # Seed test users via live API
      - name: Seed E2E users on ECS
        run: |
          API=https://${{ secrets.TEST_API_HOST }}
          OWNER_EMAIL=$(aws ssm get-parameter \
            --name /ticket-platform/test/owner-email \
            --with-decryption --query Parameter.Value --output text)
          OWNER_PASSWORD=$(aws ssm get-parameter \
            --name /ticket-platform/test/owner-password \
            --with-decryption --query Parameter.Value --output text)

          # Register buyer (must include phoneNumber — NOT NULL column)
          STATUS=$(curl -s -w "%{http_code}" -o /tmp/reg.json \
            -X POST $API/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"e2ebuyer@slingshot.dev\",\"password\":\"Password123!\",\"phoneNumber\":\"\"}")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "409" ] || \
            { echo "Buyer registration failed ($STATUS): $(cat /tmp/reg.json)"; exit 1; }
          echo "Buyer: $STATUS"

          # Seed VenueAdmin via invite flow
          OWNER_TOKEN=$(curl -sf -X POST $API/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$OWNER_EMAIL\",\"password\":\"$OWNER_PASSWORD\"}" | jq -r '.token')
          [ -n "$OWNER_TOKEN" ] || { echo "AppOwner login failed on ECS"; exit 1; }

          INVITE=$(curl -sf -X POST $API/admin/invites \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OWNER_TOKEN" \
            -d '{"email":"venue@slingshot.dev","venueName":"Test Venue Admin"}')
          INVITE_TOKEN=$(echo "$INVITE" | jq -r '.token // empty')

          if [ -n "$INVITE_TOKEN" ]; then
            curl -sf -X POST "$API/invites/$INVITE_TOKEN/accept" \
              -H "Content-Type: application/json" \
              -d '{"password":"Password123!","phoneNumber":""}' > /dev/null
            echo "VenueAdmin seeded via invite"
          else
            V_STATUS=$(curl -s -w "%{http_code}" -o /tmp/vlogin.json \
              -X POST $API/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"venue@slingshot.dev","password":"Password123!"}')
            [ "$V_STATUS" = "200" ] || { echo "VenueAdmin seed failed ($V_STATUS): $(cat /tmp/vlogin.json)"; exit 1; }
            echo "VenueAdmin already exists"
          fi

      - name: Run E2E tests against ECS
        working-directory: src/TicketPlatform.Web
        env:
          E2E_API_URL: https://${{ secrets.TEST_API_HOST }}
          E2E_BASE_URL: https://${{ secrets.TEST_FRONTEND_HOST }}
        run: npx playwright test

      - name: Upload ECS E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecs-playwright-report
          path: src/TicketPlatform.Web/e2e-report/
          retention-days: 7
