name: CI/CD – Test Ring

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'helm/**'
      - 'terraform/**'
      - 'Dockerfile'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  API_IMAGE: ticket-platform-api
  FRONTEND_IMAGE: ticket-platform-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET API build ──────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & build .NET
        run: |
          dotnet restore TicketPlatform.slnx
          dotnet build TicketPlatform.slnx -c Release --no-restore

      # ── Frontend build ──────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/TicketPlatform.Web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/TicketPlatform.Web
        run: npm ci

      - name: Build frontend (type-check + bundle)
        working-directory: src/TicketPlatform.Web
        run: npm run build

      # ── Apply DB migrations ──────────────────────────────────
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply migrations
        working-directory: src/TicketPlatform.Api
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=ticketplatform;Username=postgres;Password=postgres"
        run: dotnet ef database update --project ../TicketPlatform.Infrastructure

      # ── Seed test data ───────────────────────────────────────
      - name: Seed test data
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d ticketplatform -c "
            INSERT INTO \"Venues\" (\"Id\",\"Name\",\"Address\",\"City\",\"State\",\"CreatedAt\")
            VALUES ('a0000000-0000-0000-0000-000000000001',
                    'Stubb''s Waller Creek','801 Red River St','Austin','TX',now())
            ON CONFLICT DO NOTHING;"

      # ── Start API for E2E ────────────────────────────────────
      - name: Start API
        working-directory: src/TicketPlatform.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:8080
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=ticketplatform;Username=postgres;Password=postgres"
          Payment__Provider: Mock
          Otp__Provider: Mock
          Jwt__Secret: ci-test-secret-at-least-32-characters-long
        run: |
          # Run compiled DLL directly to bypass launchSettings.json port override (5256 → 8080)
          DLL=$(find bin/Release -name "TicketPlatform.Api.dll" | head -1)
          nohup dotnet "$DLL" > /tmp/api.log 2>&1 &

      - name: Wait for API
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8080/healthz; then echo "API ready"; exit 0; fi
            echo "Waiting for API... ($i/45)"
            sleep 2
          done
          echo "=== API failed to start — full log: ==="
          cat /tmp/api.log
          exit 1

      # ── Seed E2E users ───────────────────────────────────────
      - name: Seed E2E users
        run: |
          # Register buyer (User role) — must include phoneNumber (NOT NULL column)
          STATUS=$(curl -s -w "%{http_code}" -o /tmp/reg.json \
            -X POST http://localhost:8080/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2ebuyer@slingshot.dev","password":"Password123!","phoneNumber":""}')
          [ "$STATUS" = "200" ] || [ "$STATUS" = "409" ] || \
            { echo "Buyer registration failed ($STATUS): $(cat /tmp/reg.json)"; exit 1; }
          echo "Buyer user: $STATUS"

          # Seed VenueAdmin via invite flow (AppOwner seeded from appsettings.Development.json)
          OWNER_TOKEN=$(curl -sf -X POST http://localhost:8080/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"owner@slingshot.dev","password":"ChangeMe123!"}' | jq -r '.token')
          [ -n "$OWNER_TOKEN" ] || { echo "AppOwner login failed"; exit 1; }

          INVITE=$(curl -sf -X POST http://localhost:8080/admin/invites \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OWNER_TOKEN" \
            -d '{"email":"venue@slingshot.dev","venueName":"Test Venue Admin"}')
          INVITE_TOKEN=$(echo "$INVITE" | jq -r '.token // empty')

          if [ -n "$INVITE_TOKEN" ]; then
            curl -sf -X POST "http://localhost:8080/invites/$INVITE_TOKEN/accept" \
              -H "Content-Type: application/json" \
              -d '{"password":"Password123!","phoneNumber":""}' > /dev/null
            echo "VenueAdmin seeded via invite"
          else
            echo "Invite creation response: $INVITE"
            # User may already exist with correct role — verify login works
            V_STATUS=$(curl -s -w "%{http_code}" -o /tmp/vlogin.json \
              -X POST http://localhost:8080/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"venue@slingshot.dev","password":"Password123!"}')
            [ "$V_STATUS" = "200" ] || { echo "VenueAdmin seed failed (status $V_STATUS): $(cat /tmp/vlogin.json)"; exit 1; }
            echo "VenueAdmin already exists"
          fi

      # ── Start frontend dev server ────────────────────────────
      - name: Start frontend dev server
        working-directory: src/TicketPlatform.Web
        env:
          VITE_API_URL: http://localhost:8080
        run: nohup npm run dev > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && echo "Frontend ready" && break
            echo "Waiting for frontend... ($i/20)"
            sleep 2
          done

      # ── Verify API still alive before E2E ───────────────────
      - name: Verify API alive
        run: |
          ps aux | grep -v grep | grep dotnet || echo "No dotnet process found!"
          curl -sf http://localhost:8080/healthz || (echo "=== API died — full log: ==="; cat /tmp/api.log; exit 1)

      # ── Playwright E2E tests ─────────────────────────────────
      - name: Install Playwright browsers
        working-directory: src/TicketPlatform.Web
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: src/TicketPlatform.Web
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/TicketPlatform.Web/e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. BUILD IMAGES & DEPLOY TO EKS
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Test EKS
    runs-on: ubuntu-latest
    needs: test
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push API image ───────────────────────────────
      - name: Build & push API image
        run: |
          IMAGE=$ECR_REGISTRY/$API_IMAGE:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile .
          docker push $IMAGE
          # Also tag as latest for convenience
          docker tag $IMAGE $ECR_REGISTRY/$API_IMAGE:latest
          docker push $ECR_REGISTRY/$API_IMAGE:latest
          echo "api_image=$IMAGE" >> $GITHUB_ENV

      # ── Build & push frontend image ──────────────────────────
      - name: Build & push frontend image
        run: |
          IMAGE=$ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}
          docker build \
            --build-arg VITE_API_URL=https://${{ secrets.TEST_API_HOST }} \
            -t $IMAGE \
            -f Dockerfile.frontend .
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          echo "frontend_image=$IMAGE" >> $GITHUB_ENV

      # ── Configure kubectl ────────────────────────────────────
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # ── Renew ECR pull secret (token expires every 12h) ─────
      - name: Renew ECR pull secret
        run: |
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server=$ECR_REGISTRY \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }}) \
            -n ticket-platform-test \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Deploy via Helm ──────────────────────────────────────
      # Note: DB migrations run automatically via db.Database.Migrate() in Program.cs
      # on pod startup — EKS pods have VPC access to RDS, GitHub Actions runner does not.
      - name: Helm upgrade (test ring)
        run: |
          # Retrieve secrets from SSM (avoids GitHub secret special-char issues)
          DB_CONN=$(aws ssm get-parameter \
            --name /ticket-platform/test/db-connection-string \
            --with-decryption --query Parameter.Value --output text)
          JWT_SECRET=$(aws ssm get-parameter \
            --name /ticket-platform/test/jwt-secret \
            --with-decryption --query Parameter.Value --output text)
          OWNER_EMAIL=$(aws ssm get-parameter \
            --name /ticket-platform/test/owner-email \
            --with-decryption --query Parameter.Value --output text)
          OWNER_PASSWORD=$(aws ssm get-parameter \
            --name /ticket-platform/test/owner-password \
            --with-decryption --query Parameter.Value --output text)

          # S3 thumbnail bucket — optional until `terraform apply` has been run for
          # the S3/IRSA resources. Falls back gracefully to the data URI path in the API.
          THUMBNAIL_BUCKET=$(aws ssm get-parameter \
            --name /ticket-platform/test/thumbnail-bucket-name \
            --query Parameter.Value --output text 2>/dev/null || echo "")

          # Build optional S3 helm args only when the bucket is provisioned.
          S3_ARGS=""
          if [ -n "$THUMBNAIL_BUCKET" ]; then
            ACCOUNT_ID=$(echo "$ECR_REGISTRY" | cut -d. -f1)
            IRSA_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ticket-platform-test-api-irsa"
            S3_ARGS="--set aws.bucketName=${THUMBNAIL_BUCKET} --set aws.region=${{ env.AWS_REGION }} --set serviceAccount.roleArn=${IRSA_ROLE_ARN}"
            echo "S3 thumbnails enabled: bucket=${THUMBNAIL_BUCKET}"
          else
            echo "S3 thumbnails not yet provisioned — falling back to data URI storage"
          fi

          # Image pipeline CDN — optional, provisioned by deploy-image-pipeline.yml
          IMAGE_PIPELINE_ARGS=""
          CDN_DOMAIN=$(aws ssm get-parameter \
            --name /ticket-platform/test/image-cdn-domain \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          IMAGE_BUCKET=$(aws ssm get-parameter \
            --name /ticket-platform/test/image-pipeline-bucket \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -n "$CDN_DOMAIN" ]; then
            IMAGE_PIPELINE_ARGS="--set aws.cdnDomain=${CDN_DOMAIN}"
            echo "Image pipeline CDN enabled: ${CDN_DOMAIN}"
          fi
          if [ -n "$IMAGE_BUCKET" ]; then
            IMAGE_PIPELINE_ARGS="${IMAGE_PIPELINE_ARGS} --set aws.imageBucket=${IMAGE_BUCKET}"
            echo "Image pipeline bucket enabled: ${IMAGE_BUCKET}"
          fi

          helm upgrade --install ticket-platform-test ./helm \
            --namespace ticket-platform-test \
            --create-namespace \
            --values helm/values-test.yaml \
            --set image.repository=$ECR_REGISTRY/$API_IMAGE \
            --set image.tag=${{ github.sha }} \
            --set frontend.image.repository=$ECR_REGISTRY/$FRONTEND_IMAGE \
            --set frontend.image.tag=${{ github.sha }} \
            --set ingress.host=${{ secrets.TEST_API_HOST }} \
            --set frontend.ingress.host=${{ secrets.TEST_FRONTEND_HOST }} \
            --set "secrets.connectionString=$DB_CONN" \
            --set "secrets.jwtSecret=$JWT_SECRET" \
            --set "secrets.ownerEmail=$OWNER_EMAIL" \
            --set "secrets.ownerPassword=$OWNER_PASSWORD" \
            --set secrets.stripeSecretKey="unused" \
            --set secrets.stripeWebhookSecret="unused" \
            $S3_ARGS \
            $IMAGE_PIPELINE_ARGS \
            --timeout 5m \
            --wait

      # ── Apply Grafana dashboards ──────────────────────────────
      - name: Apply Grafana dashboards
        run: bash scripts/apply-grafana-dashboards.sh

      # ── Smoke test the live HTTPS endpoint ───────────────────
      - name: Smoke test – API health
        run: |
          echo "Testing https://${{ secrets.TEST_API_HOST }}/healthz"
          for i in $(seq 1 12); do
            curl -sf https://${{ secrets.TEST_API_HOST }}/healthz && echo "✅ API healthy" && break
            echo "Waiting for API ingress... ($i/12)"
            sleep 10
          done

      - name: Smoke test – Frontend
        run: |
          echo "Testing https://${{ secrets.TEST_FRONTEND_HOST }}"
          curl -sf https://${{ secrets.TEST_FRONTEND_HOST }} | grep -q "Slingshot\|ticket" \
            && echo "✅ Frontend reachable" \
            || (echo "❌ Frontend check failed" && exit 1)

  # ─────────────────────────────────────────────────────────────
  # 3. E2E TESTS AGAINST LIVE EKS ENDPOINTS
  # ─────────────────────────────────────────────────────────────
  e2e-eks:
    name: E2E – Test Ring
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/TicketPlatform.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/TicketPlatform.Web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/TicketPlatform.Web
        run: npx playwright install chromium --with-deps

      # Seed test users via live API
      - name: Seed E2E users on EKS
        run: |
          API=https://${{ secrets.TEST_API_HOST }}
          OWNER_EMAIL=$(aws ssm get-parameter \
            --name /ticket-platform/test/owner-email \
            --with-decryption --query Parameter.Value --output text)
          OWNER_PASSWORD=$(aws ssm get-parameter \
            --name /ticket-platform/test/owner-password \
            --with-decryption --query Parameter.Value --output text)

          # Register buyer (must include phoneNumber — NOT NULL column)
          STATUS=$(curl -s -w "%{http_code}" -o /tmp/reg.json \
            -X POST $API/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"e2ebuyer@slingshot.dev\",\"password\":\"Password123!\",\"phoneNumber\":\"\"}")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "409" ] || \
            { echo "Buyer registration failed ($STATUS): $(cat /tmp/reg.json)"; exit 1; }
          echo "Buyer: $STATUS"

          # Seed VenueAdmin via invite flow
          OWNER_TOKEN=$(curl -sf -X POST $API/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$OWNER_EMAIL\",\"password\":\"$OWNER_PASSWORD\"}" | jq -r '.token')
          [ -n "$OWNER_TOKEN" ] || { echo "AppOwner login failed on EKS"; exit 1; }

          INVITE=$(curl -sf -X POST $API/admin/invites \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OWNER_TOKEN" \
            -d '{"email":"venue@slingshot.dev","venueName":"Test Venue Admin"}')
          INVITE_TOKEN=$(echo "$INVITE" | jq -r '.token // empty')

          if [ -n "$INVITE_TOKEN" ]; then
            curl -sf -X POST "$API/invites/$INVITE_TOKEN/accept" \
              -H "Content-Type: application/json" \
              -d '{"password":"Password123!","phoneNumber":""}' > /dev/null
            echo "VenueAdmin seeded via invite"
          else
            V_STATUS=$(curl -s -w "%{http_code}" -o /tmp/vlogin.json \
              -X POST $API/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"venue@slingshot.dev","password":"Password123!"}')
            [ "$V_STATUS" = "200" ] || { echo "VenueAdmin seed failed ($V_STATUS): $(cat /tmp/vlogin.json)"; exit 1; }
            echo "VenueAdmin already exists"
          fi

      - name: Run E2E tests against EKS
        working-directory: src/TicketPlatform.Web
        env:
          E2E_API_URL: https://${{ secrets.TEST_API_HOST }}
          E2E_BASE_URL: https://${{ secrets.TEST_FRONTEND_HOST }}
        run: npx playwright test

      - name: Upload EKS E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eks-playwright-report
          path: src/TicketPlatform.Web/e2e-report/
          retention-days: 7
