name: Deploy – Image Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'infra/image-transformer/**'
      - '.github/workflows/deploy-image-pipeline.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_DIR: infra/terraform
  LAMBDA_DIR: infra/image-transformer

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. INSTALL LAMBDA DEPENDENCIES (Linux x64 for Lambda runtime)
  # ─────────────────────────────────────────────────────────────
  build-lambda:
    name: Build Lambda Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies for Lambda (Linux x64, production only)
        working-directory: infra/image-transformer
        run: npm ci --omit=dev --platform=linux --arch=x64 --libc=glibc

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-transformer-${{ github.sha }}
          path: infra/image-transformer/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # 2. TERRAFORM – TEST
  # ─────────────────────────────────────────────────────────────
  deploy-test:
    name: Terraform – Test
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: image-transformer-${{ github.sha }}
          path: infra/image-transformer/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Embed bucket config into Lambda package
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          # Fix Terraform S3 backend config (replace <ACCOUNT_ID> placeholder)
          sed -i "s/<ACCOUNT_ID>/${ACCOUNT_ID}/g" ${{ env.TF_DIR }}/environments/test-backend.tfvars
          BUCKET_NAME="ticket-platform-test-images-${ACCOUNT_ID}"
          cat > ${{ env.LAMBDA_DIR }}/config.js << EOF
          'use strict';
          module.exports = { IMAGE_BUCKET: '${BUCKET_NAME}', BUCKET_REGION: '${AWS_REGION}' };
          EOF
          echo "✅ Embedded bucket: ${BUCKET_NAME}"

      - name: Bootstrap Terraform state backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TF_STATE_BUCKET="ticket-platform-tf-state-${ACCOUNT_ID}"
          TF_LOCK_TABLE="ticket-platform-tf-locks"

          # Create S3 state bucket if it doesn't exist
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Creating Terraform state bucket: $TF_STATE_BUCKET"
            aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --region us-east-1
            aws s3api put-bucket-versioning --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$TF_STATE_BUCKET" \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "✅ State bucket created"
          else
            echo "✅ State bucket already exists"
          fi

          # Create DynamoDB lock table if it doesn't exist
          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region us-east-1 2>/dev/null; then
            echo "Creating Terraform lock table: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region us-east-1
            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE" --region us-east-1
            echo "✅ Lock table created"
          else
            echo "✅ Lock table already exists"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.6'

      - name: Terraform Init (test)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config=environments/test-backend.tfvars \
            -reconfigure


      - name: Import existing resources into Terraform state
        working-directory: ${{ env.TF_DIR }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ENV="test"
          TFVARS="-var-file=environments/${ENV}.tfvars"

          tf_import() {
            local resource="$1" id="$2" label="$3"
            if terraform state show "$resource" &>/dev/null; then
              echo "  already in state: $label"
              return
            fi
            echo "  importing $label ($id)..."
            terraform import $TFVARS -input=false "$resource" "$id" && \
              echo "  imported: $label" || echo "  not found in AWS, will be created: $label"
          }

          tf_import aws_iam_role.lambda_edge_image \
            "ticket-platform-${ENV}-lambda-edge-image" "IAM role"

          tf_import aws_lambda_function.image_transformer \
            "ticket-platform-${ENV}-image-transformer" "Lambda function"

          BUCKET="ticket-platform-${ENV}-images-${ACCOUNT_ID}"
          tf_import aws_s3_bucket.images_original "$BUCKET" "S3 bucket"

          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='ticket-platform-${ENV}-images-oac'].Id | [0]" \
            --output text 2>/dev/null)
          if [ -n "$OAC_ID" ] && [ "$OAC_ID" != "None" ]; then
            tf_import aws_cloudfront_origin_access_control.images "$OAC_ID" "OAC"
          fi

          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='ticket-platform-${ENV} image CDN'].Id | [0]" \
            --output text 2>/dev/null)
          if [ -n "$CF_ID" ] && [ "$CF_ID" != "None" ]; then
            tf_import aws_cloudfront_distribution.images "$CF_ID" "CloudFront distribution"
          fi

      - name: Terraform Plan (test)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=environments/test.tfvars \
            -out=tfplan-test \
            -detailed-exitcode \
            -input=false
        continue-on-error: true
        id: plan

      - name: Terraform Apply (test)
        working-directory: ${{ env.TF_DIR }}
        if: steps.plan.outcome == 'success' || steps.plan.outputs.exitcode == '2'
        run: |
          terraform apply -input=false tfplan-test

      - name: Wait for CloudFront and Lambda@Edge propagation
        working-directory: ${{ env.TF_DIR }}
        run: |
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "Waiting for CloudFront distribution $CF_ID to reach Deployed status..."
          aws cloudfront wait distribution-deployed --id "$CF_ID"
          echo "✅ CloudFront deployed. Waiting 5 minutes for Lambda@Edge edge propagation..."
          sleep 300

      - name: Export outputs to SSM (test)
        working-directory: ${{ env.TF_DIR }}
        run: |
          CDN_DOMAIN=$(terraform output -raw cdn_domain)
          IMAGE_BUCKET=$(terraform output -raw image_upload_bucket)
          aws ssm put-parameter \
            --name "/ticket-platform/test/image-cdn-domain" \
            --value "$CDN_DOMAIN" \
            --type "String" \
            --overwrite
          aws ssm put-parameter \
            --name "/ticket-platform/test/image-pipeline-bucket" \
            --value "$IMAGE_BUCKET" \
            --type "String" \
            --overwrite
          echo "✅ CDN domain: $CDN_DOMAIN"
          echo "✅ Image bucket: $IMAGE_BUCKET"

  # ─────────────────────────────────────────────────────────────
  # 3. INTEGRATION TESTS (run against deployed test infra)
  # ─────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests – Test
    runs-on: ubuntu-latest
    needs: deploy-test
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (host platform)
        working-directory: ${{ env.LAMBDA_DIR }}
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch deployed config from SSM
        id: ssm
        run: |
          CDN_DOMAIN=$(aws ssm get-parameter --name "/ticket-platform/test/image-cdn-domain" --query "Parameter.Value" --output text)
          IMAGE_BUCKET=$(aws ssm get-parameter --name "/ticket-platform/test/image-pipeline-bucket" --query "Parameter.Value" --output text)
          echo "cdn_domain=$CDN_DOMAIN" >> $GITHUB_OUTPUT
          echo "image_bucket=$IMAGE_BUCKET" >> $GITHUB_OUTPUT

      - name: Run integration tests
        working-directory: ${{ env.LAMBDA_DIR }}
        env:
          CDN_DOMAIN: ${{ steps.ssm.outputs.cdn_domain }}
          IMAGE_BUCKET: ${{ steps.ssm.outputs.image_bucket }}
          BUCKET_REGION: ${{ env.AWS_REGION }}
        run: npm run test:integration

